<!DOCTYPE html>
<html>
<head>
<title>Escalator Digital Twin</title>

<style>
body { margin: 0; overflow: hidden; }
</style>

<!-- Import map fixes "three module" error -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

</head>

<body>

<script type="module">

import * as THREE from "three";
import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";
import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

// ---------------- GLOBAL STATE ----------------
let mixer;
let modelRef;
let healthScore = 100;
let escalatorStatus = "Running";

const clock = new THREE.Clock();

// ---------------- SCENE ----------------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

// ---------------- CAMERA ----------------
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(2, 2, 2);

// ---------------- RENDERER ----------------
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// ---------------- MOUSE CONTROLS ----------------
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.minDistance = 2;
controls.maxDistance = 20;

// ---------------- LIGHTS ----------------
scene.add(new THREE.AmbientLight(0xffffff, 0.7));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 7);
scene.add(light);

// ---------------- MODEL LOADER ----------------
const loader = new GLTFLoader();

loader.load(
  "escalator.glb",

  // success
  (gltf) => {

    console.log("MODEL LOADED SUCCESSFULLY");

    const model = gltf.scene;
    model.scale.set(6, 6, 6);
    scene.add(model);
    modelRef = model;

    // -------- AUTO CENTER MODEL --------
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());

    model.position.x -= center.x;
    model.position.y -= center.y;
    model.position.z -= center.z;

    const maxDim = Math.max(size.x, size.y, size.z);
    const fov = camera.fov * (Math.PI / 180);
    let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));

    cameraZ *= 1.5;
    camera.position.z = cameraZ;
    camera.lookAt(0, 0, 0);

    // -------- PLAY ANIMATION --------
    if (gltf.animations.length > 0) {

      mixer = new THREE.AnimationMixer(model);

      gltf.animations.forEach((clip) => {
        const action = mixer.clipAction(clip);
        action.loop = THREE.LoopRepeat;
        action.play();
      });

    } else {
      console.log("No animation found in model");
    }
  },

  undefined,

  (error) => {
    console.error("MODEL LOAD ERROR:", error);
  }
);

// ---------------- UPDATE MODEL COLOR ----------------
function updateModelColor(){

  if(!modelRef||healthScore==100) return;

  let color;

  if(healthScore > 80) color = 0x00ff00;      // green
  else if(healthScore > 50) color = 0xffff00; // yellow
  else if(healthScore > 20) color = 0xffa500; // orange
  else color = 0xff0000;                      // red

  modelRef.traverse((child)=>{
    if(child.isMesh){
      child.material.color.setHex(color);
    }
  });
}

// ---------------- FETCH DATA FROM BACKEND ----------------
async function fetchEscalatorData() {

  try {

    const res = await fetch("http://127.0.0.1:8000/predict-once");
    const data = await res.json();

    console.log("Digital Twin Data:", data);

    // update health
    healthScore = data.health_score;

    // -------- STOP ESCALATOR WHEN FAILED --------
    if (data.predicted_rul <= 0) {
      console.log("ESCALATOR SHOULD STOP NOW");
      escalatorStatus = "Critical";

      if (mixer) {
        console.log("Mixer:", mixer);
        mixer = null;
      }

      updateModelColor();
      return;
    }

    // normal operation
    escalatorStatus = data.health_state;

    updateModelColor();

  } catch (err) {
    console.log("Backend not running");
  }
}

// fetch every second
setInterval(fetchEscalatorData, 1000);

// ---------------- ANIMATION LOOP ----------------
function animate() {

  requestAnimationFrame(animate);

  if (mixer && escalatorStatus !== "Critical") {
    mixer.update(clock.getDelta());
  }

  controls.update();
  renderer.render(scene, camera);
}

animate();

// ---------------- WINDOW RESIZE ----------------
window.addEventListener("resize", () => {

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth, window.innerHeight);

});

</script>

</body>
</html>
